name: dang-reel

on:
  # Trigger qua HTTP: POST .../dispatches  với event_type = "dang-reel"
  repository_dispatch:
    types: [dang-reel]
  # Cho phép bấm chạy tay trên GitHub UI
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Đăng Reel "Chờ đăng" (Lark Base -> Facebook Page)
        env:
          # Bí mật -> GitHub Secrets
          LARK_APP_ID: ${{ secrets.LARK_APP_ID }}
          LARK_APP_SECRET: ${{ secrets.LARK_APP_SECRET }}
          FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
          # Tùy chọn ghi đè qua body request (nếu trống -> dùng default trong script)
          LARK_APP_TOKEN: ${{ github.event.client_payload.app_token }}
          LARK_TABLE_ID: ${{ github.event.client_payload.table_id }}
          FB_PAGE_ID: ${{ github.event.client_payload.fb_page_id }}
          RESPECT_SCHEDULE: ${{ github.event.client_payload.respect_schedule }}
        run: node .claude/skills/dang-reel-facebook/scripts/post-reels-api.js
