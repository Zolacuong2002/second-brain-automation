name: seed-bai-viet

on:
  # Trigger qua HTTP: POST .../dispatches  với event_type = "seed-bai-viet"
  repository_dispatch:
    types: [seed-bai-viet]
  # Cho phép bấm chạy tay trên GitHub UI
  workflow_dispatch:
    inputs:
      category:
        description: "slug category WordPress"
        required: true

jobs:
  seed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests
      - name: Cào category WordPress -> bảng BÀI VIẾT (Lark)
        env:
          LARK_APP_ID: ${{ secrets.LARK_APP_ID }}
          LARK_APP_SECRET: ${{ secrets.LARK_APP_SECRET }}
        run: |
          python .claude/skills/seed-bai-viet/scripts/seed_category.py \
            --wp-url "${{ vars.WP_URL }}" \
            --category "${{ github.event.client_payload.category || github.event.inputs.category }}" \
            --app-token "${{ vars.LARK_APP_TOKEN }}" \
            --table-id "${{ vars.LARK_TABLE_ID }}"
